# --- CONFIGURACIÓN DE INFRAESTRUCTURA VISUAL ---
defaultAppearance = "dark" # Forzar inicio en oscuro
disableThemeToggle = true  # ELIMINAR EL BOTÓN SOL/LUNA

[cms]
  cmsName = "netlify-cms"

# Definir paleta de colores fija para asegurar contraste
[colors]
  highlight = "#2563eb" # Azul corporativo para enlaces/acentos
  background = "#0a0a0a" # Negro profundo de fondo
  text = "#e5e5e5"       # Gris muy claro para el texto principal
  textStrong = "#ffffff" # Blanco puro para títulos y tu nuevo logo

[homepage]
  layout = "profile"

[article]
  showReadingTime = false
  showWordCount = false
  showDate = false
  showAuthor = false
  showFeatureImage = true
  showFeatureImageWebp = true


[list]
  showCards = false
  showThumbnails = true
  groupByYear = false

[author]
  name = "Alejandro Peñafuerte Acosta"
  image = "img/avatar.png" # Asegúrate de haber subido el logo corregido
  headline = "Administrador de Sistemas Linux"
  bio = "Automatización, infraestructura y resolución de problemas. Aquí documento configuraciones, despliegues y mi stack tecnológico diario."

  [[author.links]]
